<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover για τα safe areas του iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Power Fit</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#23604F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Power Fit">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Banner ενημερωσης: εμφανιζεται οταν υπαρχει νεα εκδοση σε αναμονη -->
  <div id="update-banner" hidden>
    <span>Νέα έκδοση διαθέσιμη</span>
    <button class="btn small" data-act="apply-update">Ανανέωση</button>
  </div>

  <!-- Κεφαλιδα: brand στο κεντρο, ενδειξη sync αριστερα, backup δεξια -->
  <header class="topbar">
    <span id="sync-status" class="sync-status mono" hidden></span>
    <div class="brand-wrap">
      <img class="brand-logo" src="icons/logo.png" alt="Power Fit" data-act="balance">
      <h1 id="view-title">Μέλη</h1>
    </div>
    <button class="icon-btn" data-act="backup" aria-label="Αντίγραφα ασφαλείας">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v10M8 9l4 4 4-4M4 17v3h16v-3"/>
      </svg>
    </button>
  </header>

  <!-- Περιεχομενο ενεργης οψης -->
  <main id="main"></main>

  <!-- Πλωτο κουμπι προσθηκης -->
  <button class="fab" data-act="fab" aria-label="Προσθήκη">
    <svg class="icon fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- Κατω tab bar -->
  <nav class="tabbar">
    <button class="tab active" data-view="members">Μέλη</button>
    <button class="tab" data-view="packages">Πακέτα<span id="unpaid-badge" class="tab-badge" hidden></span></button>
    <button class="tab" data-view="appointments">Ραντεβού</button>
  </nav>

  <!-- Toasts: συντομες επιβεβαιωσεις ενεργειων -->
  <div id="toasts"></div>

  <!-- Bottom sheet για φορμες -->
  <div id="sheet-overlay">
    <div id="sheet-content" class="sheet"></div>
  </div>

  <script src="logic.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
