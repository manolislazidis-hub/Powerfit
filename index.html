<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover για τα safe areas του iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Power Fit</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#23604F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Power Fit">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Banner ενημερωσης: εμφανιζεται οταν υπαρχει νεα εκδοση σε αναμονη -->
  <div id="update-banner" hidden>
    <span>Νέα έκδοση διαθέσιμη</span>
    <button class="btn small" data-act="apply-update">Ανανέωση</button>
  </div>

  <!-- Κεφαλιδα: τιτλος οψης, ενδειξη συγχρονισμου και κουμπι backup -->
  <header class="topbar">
    <div>
      <div class="brand">Power Fit</div>
      <h1 id="view-title">Μέλη</h1>
    </div>
    <div class="topbar-right">
      <span id="sync-status" class="sync-status mono" hidden></span>
      <button class="icon-btn" data-act="backup" aria-label="Αντίγραφα ασφαλείας">⇅</button>
    </div>
  </header>

  <!-- Περιεχομενο ενεργης οψης -->
  <main id="main"></main>

  <!-- Πλωτο κουμπι προσθηκης -->
  <button class="fab" data-act="fab" aria-label="Προσθήκη">+</button>

  <!-- Κατω tab bar -->
  <nav class="tabbar">
    <button class="tab active" data-view="members">Μέλη</button>
    <button class="tab" data-view="packages">Πακέτα</button>
    <button class="tab" data-view="appointments">Ραντεβού</button>
  </nav>

  <!-- Bottom sheet για φορμες -->
  <div id="sheet-overlay">
    <div id="sheet-content" class="sheet"></div>
  </div>

  <script src="logic.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
